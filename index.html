<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Cart Application</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <header class="topbar">
        <div class="container nav">
            <div class="brand">
                <div class="brand-text">
                    <h1>Shopping Cart</h1>
                    <p>Fresh groceries and daily essentials</p>
                </div>
            </div>
            <nav>
                <a href="index.html" class="active">Shop</a>
                <a href="login.html">Login</a>
                <a href="admin.html">Admin</a>
            </nav>
        </div>
    </header>

    <main class="container layout">
        <section class="content-area">
            <div class="hero">
                <h2>Browse Products</h2>
                <p>Vegetables, fruits, cakes, biscuits and more.</p>
            </div>

            <div class="toolbar">
                <div id="categoryFilters" class="category-list"></div>
                <input type="text" id="searchInput" placeholder="Search products..." />
            </div>

            <div id="productGrid" class="product-grid"></div>
        </section>

        <aside class="cart-panel">
            <h2>Your Cart</h2>
            <div id="cartItems" class="cart-items"></div>

            <div class="cart-summary">
                <div class="summary-row">
                    <span>Items Total</span>
                    <span id="itemsTotal">LKR 0.00</span>
                </div>
                <div class="summary-row">
                    <span>Delivery</span>
                    <span id="deliveryFee">LKR 250.00</span>
                </div>
                <div class="summary-row grand-total">
                    <span>Grand Total</span>
                    <span id="grandTotal">LKR 250.00</span>
                </div>
            </div>

            <button id="checkoutBtn" class="btn btn-primary full-width">Checkout</button>

            <div id="checkoutSummary" class="checkout-box hidden">
                <h3>Order Summary</h3>
                <div id="summaryContent"></div>
            </div>
        </aside>
    </main>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
