<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel - Shopping Cart Application</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <header class="topbar">
        <div class="container nav">
            <div class="brand">
                <div class="brand-text">
                    <h1>Shopping Cart</h1>
                    <p>Fresh groceries and daily essentials</p>
                </div>
            </div>
            <nav>
                <a href="index.html">Shop</a>
                <a href="login.html">Login</a>
                <a href="admin.html" class="active">Admin</a>
            </nav>
        </div>
    </header>

    <main class="container admin-page">
        <section class="admin-grid">
            <div class="card">
                <h2>Category Form</h2>
                <form id="categoryForm">
                    <input type="hidden" id="oldCategoryName" />

                    <label for="categoryName">Category Name</label>
                    <input type="text" id="categoryName" required />

                    <div class="action-group">
                        <button type="submit" class="btn btn-primary">Save Category</button>
                        <button type="button" id="cancelCategoryEdit" class="btn btn-secondary hidden">Cancel</button>
                    </div>
                </form>
            </div>

            <div class="card">
                <h2>Add Product</h2>
                <form id="productForm">
                    <input type="hidden" id="productId" />

                    <label for="productName">Product Name</label>
                    <input type="text" id="productName" required />

                    <label for="productCategory">Category</label>
                    <select id="productCategory" required></select>

                    <label for="productPrice">Price</label>
                    <input type="number" id="productPrice" min="0" step="0.01" required />

                    <label for="productDescription">Description</label>
                    <textarea id="productDescription" rows="3" required></textarea>

                    <label for="productImage">Image URL</label>
                    <input type="text" id="productImage" placeholder="https://example.com/image.jpg" required />

                    <button type="submit" class="btn btn-primary">Save Product</button>
                </form>
            </div>
        </section>

        <section class="card">
            <h2>Categories</h2>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Category Name</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="categoryTableBody"></tbody>
                </table>
            </div>
        </section>

        <section class="card">
            <h2>Products</h2>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="productTableBody"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="js/data.js"></script>
    <script src="js/admin.js"></script>
</body>

</html>
